services:
  register-console:
    build:
      context: .
      dockerfile: web_console/Dockerfile
    container_name: mregister_2
    ports:
      - "8200:8000"
    environment:
      WEB_CONSOLE_MAX_CONCURRENT_TASKS: "2"
      WEB_CONSOLE_POLL_INTERVAL: "1.0"
    volumes:
      - ./web_console/runtime:/app/web_console/runtime
    restart: unless-stopped
